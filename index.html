<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>BlueLock Stats Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="app">
  <div id="controls" class="controls">
    <h2>Stats Controller</h2>

    <div class="control name-control" style="display:flex;gap:8px;align-items:center;">
      <label for="playerName" style="width:64px;">Name</label>
      <input id="playerName" type="text" placeholder="Player name" value="XXXX" style="flex:1;padding:6px;">
    </div>

    <div class="control" data-key="SPEED">
      <label>SPEED</label>
      <input type="range" min="0" max="100" value="70">
      <span class="value">70</span>
    </div>

    <div class="control" data-key="DEFENSE">
      <label>DEFENSE</label>
      <input type="range" min="0" max="100" value="70">
      <span class="value">70</span>
    </div>

    <div class="control" data-key="PASS">
      <label>PASS</label>
      <input type="range" min="0" max="100" value="70">
      <span class="value">70</span>
    </div>

    <div class="control" data-key="DRIBBLE">
      <label>DRIBBLE</label>
      <input type="range" min="0" max="100" value="70">
      <span class="value">70</span>
    </div>

    <div class="control" data-key="SHOOT">
      <label>SHOOT</label>
      <input type="range" min="0" max="100" value="70">
      <span class="value">70</span>
    </div>

    <div class="control" data-key="OFFENSE">
      <label>OFFENSE</label>
      <input type="range" min="0" max="100" value="70">
      <span class="value">70</span>
    </div>

    <button id="download">Download Image</button>
  </div>

  <div class="canvas-wrap">
    <canvas id="profile" width="190" height="750"></canvas>
    <canvas id="radar" width="750" height="750"></canvas>
  </div>

  <div class="last-updated">
    V1.0 Last updated: January 5, 2026:
    <br><br>
    - Initial release
  </div>

  <div class="Contact">
    If you have any questions or feedback, please reach out: danielnstovell@gmail.com
  </div>
</div>

<script src="profile.js"></script>
<script src="radar.js"></script>

</body>
</html>
